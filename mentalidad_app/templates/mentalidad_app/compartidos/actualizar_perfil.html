{% extends 'mentalidad_app/home.html' %}  <!-- O la plantilla base que estés usando -->

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">Actualizar Mi Perfil</h4>
                </div>
                <div class="card-body">
                    
                    <!-- Previsualización de la foto actual si existe -->
                    <div class="text-center mb-4">
                        {% if perfil.foto %}
                            <img src="{{ perfil.foto.url }}" alt="Foto de perfil" class="rounded-circle img-thumbnail" style="width: 120px; height: 120px; object-fit: cover;">
                        {% else %}
                            <div class="rounded-circle bg-secondary text-white d-inline-flex align-items-center justify-content-center" style="width: 120px; height: 120px; font-size: 2rem;">
                                {{ request.user.username|slice:":2"|upper }}
                            </div>
                        {% endif %}
                        <p class="text-muted mt-2 mb-0">Rol: <strong>{{ perfil.rol }}</strong></p>
                    </div>

                    <!-- Formulario principal con soporte para archivos (fotos) -->
                    <form method="POST" enctype="multipart/form-data" novalidate>
                        {% csrf_token %}
                        
                        {{ form.as_p }}

                        <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
                            <a href="{% url 'home' %}" class="btn btn-secondary me-md-2">Cancelar</a>
                            <button type="submit" class="btn btn-primary">Guardar Cambios</button>
                        </div>
                    </form>

                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
